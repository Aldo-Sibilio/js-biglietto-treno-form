<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biglietto Treno</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Calcolo Biglietto Treno</h1>

      <form>

         <div>
          <label>Nome</label>
          <input type="text" id="nome">
        </div>

        <div>
          <label>Cognome</label>
          <input type="text" id="cognome">
        </div>

        <div>
          <label>Km da percorrere</label>
          <input type="number" id="km">
        </div>

        <div>
          <label>Età passeggero</label>
          <input type="number" id="eta">
        </div>

        <button type="button" id="calcola">Calcola Prezzo</button>

      </form>

      <div id="risultato" class="d-none">
        <h2>Prezzo Biglietto</h2>
        <p id="prezzo"></p>
      </div>

    </div>

  </div>

<script src="script.js"></script>

</body>
</html>
